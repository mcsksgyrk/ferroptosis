<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        .container {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 20px;
            padding: 20px;
            height: 100vh;
        }

        .controls-panel {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }

        .graph-container {
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            position: relative;
        }

        .details-panel {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            overflow-y: auto;
        }

        #graph {
            width: 100%;
            height: 100%;
        }

        .search-box {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .filter-group {
            margin-bottom: 16px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 8px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        button:hover {
            background: #45a049;
        }

        .node-property {
            margin-bottom: 12px;
            padding: 8px;
            background: white;
            border-radius: 4px;
        }

        .property-label {
            font-weight: bold;
            color: #666;
        }

        .property-value {
            margin-top: 4px;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Panel - Controls -->
        <div class="controls-panel">
            <h2>Search & Filters</h2>
            <input type="text" id="searchInput" class="search-box" placeholder="Search nodes...">

            <div class="filter-group">
                <label>Node Type</label>
                <select id="nodeTypeFilter" class="search-box">
                    <option value="">All Types</option>
                    <option value="type1">Type 1</option>
                    <option value="type2">Type 2</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Date Range</label>
                <input type="date" id="dateFrom" class="search-box">
                <input type="date" id="dateTo" class="search-box">
            </div>

            <button id="applyFilters">Apply Filters</button>
            <button id="resetFilters">Reset</button>

            <div class="filter-group">
                <label>Layout</label>
                <button id="forceLayout">Force Layout</button>
                <button id="circularLayout">Circular Layout</button>
                <button id="hierarchicalLayout">Hierarchical Layout</button>
            </div>
        </div>

        <!-- Center Panel - Graph -->
        <div class="graph-container">
            <svg id="graph"></svg>
            <div class="loading">Loading...</div>
        </div>

        <!-- Right Panel - Details -->
        <div class="details-panel">
            <h2>Node Details</h2>
            <div id="nodeDetails">
                <p>Select a node to view details</p>
            </div>
        </div>
    </div>

    <script>
        // Initialize the graph visualization when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            const graph = new GraphVisualization('#graph');
            graph.loadData();

            // Search functionality
            document.querySelector('#searchInput').addEventListener('input', (e) => {
                const searchTerm = e.target.value;
                if (searchTerm.length > 2) {  // Search after 3 characters
                    graph.filterNodes(`name LIKE '%${searchTerm}%'`);
                }
            });

            // Filter application
            document.querySelector('#applyFilters').addEventListener('click', () => {
                const nodeType = document.querySelector('#nodeTypeFilter').value;
                const dateFrom = document.querySelector('#dateFrom').value;
                const dateTo = document.querySelector('#dateTo').value;

                let filters = [];
                if (nodeType) filters.push(`type = '${nodeType}'`);
                if (dateFrom) filters.push(`date >= '${dateFrom}'`);
                if (dateTo) filters.push(`date <= '${dateTo}'`);

                graph.filterNodes(filters.join(' AND '));
            });

            // Reset filters
            document.querySelector('#resetFilters').addEventListener('click', () => {
                document.querySelector('#searchInput').value = '';
                document.querySelector('#nodeTypeFilter').value = '';
                document.querySelector('#dateFrom').value = '';
                document.querySelector('#dateTo').value = '';
                graph.loadData();
            });

            // Layout controls
            document.querySelector('#forceLayout').addEventListener('click', () => {
                graph.setLayout('force');
            });

            document.querySelector('#circularLayout').addEventListener('click', () => {
                graph.setLayout('circular');
            });

            document.querySelector('#hierarchicalLayout').addEventListener('click', () => {
                graph.setLayout('hierarchical');
            });
        });
    </script>
</body>
</html>
